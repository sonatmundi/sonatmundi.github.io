name: Instagram Auto Content (YouTube → Instagram)

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10:00 UTC (13:00 Turkey time)

  workflow_dispatch:
    inputs:
      mode:
        description: 'Content mode'
        required: true
        type: choice
        options:
          - auto
          - reels
          - posts
          - playlists
          - generate-only
        default: 'auto'
      video_id:
        description: 'Target specific YouTube video ID (optional)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install --quiet instagrapi Pillow google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2 yt-dlp

      - name: Restore Instagram session cache
        uses: actions/cache@v4
        with:
          path: ig_session.json
          key: ig-session-yt2ig-${{ secrets.INSTAGRAM_USERNAME }}
          restore-keys: |
            ig-session-yt2ig-

      - name: Restore publish history cache
        uses: actions/cache@v4
        with:
          path: publish_history.json
          key: ig-publish-history-${{ github.run_number }}
          restore-keys: |
            ig-publish-history-

      - name: Run YouTube to Instagram
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_SESSION_FILE: ${{ github.workspace }}/ig_session.json
          PUBLISH_HISTORY_FILE: ${{ github.workspace }}/publish_history.json
          YT2IG_MODE: ${{ inputs.mode || 'auto' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.video_id }}" ]; then
            EXTRA_ARGS="--video-id ${{ inputs.video_id }}"
          fi

          python -m growth.youtube_to_instagram \
            --mode ${{ inputs.mode || 'auto' }} \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            $EXTRA_ARGS

      - name: Save session artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ig-session-${{ github.run_number }}
          path: |
            ig_session.json
            publish_history.json
          retention-days: 30

      - name: Upload generated media (preview)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-media-${{ github.run_number }}
          path: media/ig_generated/
          retention-days: 7
          if-no-files-found: ignore

      - name: Send email notification on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import smtplib, os
          from email.mime.text import MIMEText
          addr = os.environ.get('GMAIL_ADDRESS','')
          pwd = os.environ.get('GMAIL_APP_PASSWORD','')
          if not addr or not pwd:
              print('No email config, skipping notification.')
              exit(0)
          msg = MIMEText('Instagram Auto Content workflow failed.\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'plain', 'utf-8')
          msg['Subject'] = 'Sonat Mundi: Instagram Auto Content FAILED'
          msg['From'] = addr
          msg['To'] = addr
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(addr, pwd)
              s.send_message(msg)
          print('Failure notification sent.')
          "
