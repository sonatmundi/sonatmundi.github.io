name: Weekly Trending Analysis

on:
  schedule:
    - cron: '0 7 * * 3'   # Every Wednesday at 07:00 UTC (10:00 TR)
  workflow_dispatch:

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup credentials
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN" | base64 -d > token.json
          echo "$YOUTUBE_CREDENTIALS" | base64 -d > credentials.json

      - name: Run trending analysis with competitor check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python -m growth.trending_analyzer --competitors

      - name: Upload trending report
        uses: actions/upload-artifact@v4
        with:
          name: trending-report-${{ github.run_number }}
          path: growth/reports/
          retention-days: 90

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📈 Sonat Mundi — Haftalık Trend Analizi (${{ job.status }})"
          to: sjrkocaman@gmail.com
          from: ${{ secrets.GMAIL_USER }}
          body: |
            Sonat Mundi — Haftalık Trend Analizi
            =====================================
            Durum: ${{ job.status }}
            Tarih: ${{ github.event.repository.updated_at }}

            Trend raporu ve rakip analizi tamamlandı.
            Detaylı rapor artifacts bölümünden indirilebilir.

            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: growth/reports/trending_*.json
