name: Auto-Translate Video Metadata

on:
  # Run after website update workflow completes
  workflow_run:
    workflows: ["Auto-Update Website Content"]
    types: [completed]
  # Also run daily at 3 AM UTC (6 AM Turkey) to catch any new uploads
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    # Only run if triggered manually, on schedule, or if the website update succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2 deep-translator

      - name: Translate video metadata
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          python -u scripts/translate_videos.py
