name: Weekly SEO Audit

on:
  schedule:
    - cron: '0 7 * * 5'   # Every Friday at 07:00 UTC (10:00 TR)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup credentials
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_TOKEN" | base64 -d > token.json
          echo "$YOUTUBE_CREDENTIALS" | base64 -d > credentials.json

      - name: Run SEO audit on all videos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python -m growth.seo_optimizer --all

      - name: Upload SEO report
        uses: actions/upload-artifact@v4
        with:
          name: seo-audit-${{ github.run_number }}
          path: growth/reports/
          retention-days: 90

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Sonat Mundi — Haftalik SEO Denetimi (${{ job.status }})"
          to: sjrkocaman@gmail.com
          from: Sonat Mundi <unitedcoloursofsound@gmail.com>
          body: |
            Sonat Mundi — Haftalik SEO Denetimi
            ====================================
            Durum: ${{ job.status }}

            Tum videolarin SEO analizi tamamlandi.
            Detayli rapor ekte ve artifacts bolumunde.

            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: growth/reports/seo_audit_*.json
