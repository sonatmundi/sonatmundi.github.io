name: Auto-Update Website Content

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if no changes'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Fetch YouTube data
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "Sonat Mundi Bot"
          git config user.email "unitedcoloursofsound@gmail.com"
          git add data/channel.json
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Auto-update: refresh channel data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
